<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Travels</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="intro-overlay">
    <span class="intro-text intro-left">Recording is<br>Remembering</span>
    <span class="intro-text intro-right">Sharing is<br>Caring</span>
  </div>

  <main>
    <div id="list-view" class="list-view active"></div>
  </main>

  <footer class="site-footer">
    <div class="footer-main">
      <div class="footer-nl">
        <div>
          <h2 class="footer-heading">Newsletter</h2>
          <p class="footer-nl-desc">새로운 여정이 추가되면 메일로 받아보세요.</p>
        </div>
        <a class="footer-nl-btn" href="https://fromj.stibee.com/" target="_blank" rel="noopener">구독하기</a>
      </div>
      <div class="footer-contact">
        <h2 class="footer-heading">Contact</h2>
        <nav class="footer-links">
          <a class="footer-link" href="mailto:joneam99@gmail.com">Mail</a>
          <a class="footer-link" href="https://www.instagram.com/_j___oo/" target="_blank" rel="noopener">Instagram</a>
        </nav>
      </div>
    </div>
    <div class="footer-bottom">
      <span class="site-footer-slogan">Recording is Remembering. Sharing is Caring.</span>
      <span class="site-footer-copy">© Jungeun Joo. All rights reserved.</span>
    </div>
  </footer>

  <div class="preview-popup" id="preview-popup">
    <img id="preview-img" src="" alt="">
  </div>

  <div id="page-overlay"></div>
  <div id="custom-cursor" class="custom-cursor"><span id="cursor-label" class="cursor-label"></span></div>

  <script src="data.js"></script>
  <script src="index.js"></script>
  <script src="scripts/ui.js"></script>
  <script>
    (function () {
      const el = document.getElementById('intro-overlay');
      requestAnimationFrame(() => requestAnimationFrame(() => el.classList.add('show')));
      setTimeout(() => {
        el.classList.add('fade-out');
        el.addEventListener('transitionend', () => el.remove(), { once: true });
      }, 1000);
    })();
  </script>
</body>
</html>
